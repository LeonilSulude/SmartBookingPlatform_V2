services:
  auth-db:
    image: postgres:16
    container_name: auth-db-v2
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - auth_pgdata-v2:/var/lib/postgresql/data
  catalog-db:
    image: postgres:16
    container_name: catalog-db-v2
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    ports:
      - "5433:5432"
    volumes:
      - catalog_pgdata-v2:/var/lib/postgresql/data
      
  booking-db:
    image: postgres:16
    container_name: booking-db-v2
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5434:5432"
    volumes:
      - booking_pgdata-v2:/var/lib/postgresql/data

  log-db:
    image: postgres:16
    container_name: log-db-v2
    environment:
      POSTGRES_DB: logs
      POSTGRES_USER: log_user
      POSTGRES_PASSWORD: log_pass
    ports:
      - "5435:5432"
    volumes:
      - log_pgdata-v2:/var/lib/postgresql/data

      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-v2
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true



volumes:
  auth_pgdata-v2:
  catalog_pgdata-v2:
  booking_pgdata-v2:
  log_pgdata-v2:
