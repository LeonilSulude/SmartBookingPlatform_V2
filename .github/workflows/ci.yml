name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - api-gateway
          - auth-service
          - booking-service
          - catalog-service
          - discovery-service
          - log-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # *Test.java / *Tests.java convention, bound to Surefire's default "test" phase —
      # no Testcontainers/Docker involved, this is the fast fail-fast gate
      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Unit Tests - ${{ matrix.service }}
          path: '${{ matrix.service }}/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests (${{ matrix.service }})
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - booking-service
          - catalog-service
          - discovery-service
          - log-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # *IT.java convention, bound to Failsafe's "integration-test"/"verify" phases.
      # Docker is already installed and running on ubuntu-latest runners, so Testcontainers
      # (Postgres, Kafka, RabbitMQ) and the Pact provider verification tests just work —
      # no docker-in-docker setup, no "services:" block needed.
      - name: Run integration tests (Testcontainers + Pact contract verification)
        working-directory: ${{ matrix.service }}
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Integration Tests - ${{ matrix.service }}
          path: '${{ matrix.service }}/target/failsafe-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/failsafe-reports/
          retention-days: 7
          if-no-files-found: ignore
