global:
  scrape_interval: 15s  # how often Prometheus polls each service for metrics

scrape_configs:
  # each job corresponds to one microservice
  # metrics_path points to the Spring Actuator endpoint that exposes Prometheus metrics
  # host.docker.internal resolves to the host machine from inside the Docker container

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'catalog-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'booking-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']

  - job_name: 'log-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8090']
