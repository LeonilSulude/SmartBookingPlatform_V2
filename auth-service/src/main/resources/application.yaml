server:
  port: 8081  # The port where the auth-service will run

spring:
  application:
    name: auth-service  # Registered name in Eureka

  datasource:
    url: jdbc:postgresql://localhost:5432/auth  # PostgreSQL database URL
    username: auth_user                         # Database username
    password: auth_pass                         # Database password

  jpa:
    hibernate:
      ddl-auto: validate  # schema is created by Flyway migrations — Hibernate verifies entities match, never modifies
    show-sql: true           # Show SQL statements in the logs
    properties:
      hibernate:
        format_sql: true     # Format SQL output for readability

  defer-datasource-initialization: true  # ensures Flyway runs migrations before Hibernate validates the schema

# Vault was evaluated for secret management but abandoned early on; the JWT secret is
# loaded from the JWT_SECRET environment variable instead (see .env / start-platform.sh).
security:
  jwt:
    secret: ${JWT_SECRET} # Loaded from environment variable
    expiration: 3600000  # JWT expiration time in milliseconds. 3600000 = 1 hour.

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
      # The Eureka server where this service registers and discovers others

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus  # expose prometheus endpoint for scraping
  tracing:
    sampling:
      probability: 1.0  # sample every request — acceptable in development
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # Zipkin collector endpoint
