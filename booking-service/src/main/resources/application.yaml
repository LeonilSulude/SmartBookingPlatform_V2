spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5434/booking
    username: booking_user
    password: booking_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  defer-datasource-initialization: true  # ensures Flyway runs migrations before Hibernate validates the schema

server:
  port: 8083

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:
  circuitbreaker:
    instances:
      catalogService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      catalogService:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      catalogService:
        timeoutDuration: 2s

