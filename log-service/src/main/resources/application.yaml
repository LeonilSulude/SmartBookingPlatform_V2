server:
  port: 8090
  # Log-service does not expose REST APIs
  # Port is only for actuator and internal access

spring:
  application:
    name: log-service

  datasource:
    url: jdbc:postgresql://localhost:5435/logs
    username: log_user
    password: log_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  defer-datasource-initialization: true  # ensures Flyway runs migrations before Hibernate validates the schema

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus  # expose prometheus endpoint for scraping
  tracing:
    sampling:
      probability: 1.0  # sample every request — acceptable in development
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # Zipkin collector endpoint
